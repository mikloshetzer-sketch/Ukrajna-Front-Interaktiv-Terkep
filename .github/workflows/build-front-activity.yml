name: Build Front Activity Index

on:
  workflow_dispatch:

  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

jobs:
  build-front-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Repository letöltése
        uses: actions/checkout@v4

      - name: Python telepítése
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python csomagok telepítése
        run: |
          pip install shapely

      - name: Front Activity Index építése
        run: python scripts/build_front_activity.py

      - name: Területi delta GeoJSON építése
        run: python scripts/build_territorial_delta.py

      - name: Változások commitolása
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/history/front_activity.json
          git add docs/data/history/front_activity.json
          git add docs/data/front_activity_latest.json
          git add data/territorial_delta.geojson
          git add docs/data/territorial_delta.geojson

          git commit -m "Front Activity Index és territorial delta frissítése" || echo "Nincs változás"
          git push
