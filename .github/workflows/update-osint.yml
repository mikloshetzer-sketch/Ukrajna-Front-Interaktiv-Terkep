name: Update OSINT feed

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5,11,17 * * *"

permissions:
  contents: write

jobs:
  update-osint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run OSINT updater
        run: |
          python scripts/update_osint.py

      - name: Commit updated OSINT data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/osint_feed.json data/osint_archive scripts/update_osint.py

          if git diff --cached --quiet; then
            echo "No OSINT changes to commit"
          else
            git commit -m "Update OSINT feed"
            git push
          fi
