name: Run Coordinate Analysis

on:
  workflow_dispatch:
    inputs:
      lat:
        description: "Latitude"
        required: true
        type: string
      lon:
        description: "Longitude"
        required: true
        type: string
      radius:
        description: "Search radius in meters"
        required: false
        default: "750"
        type: string

permissions:
  contents: write

jobs:
  run-coordinate-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Create analysis job
        run: |
          python scripts/create_analysis_job.py \
            --lat "${{ github.event.inputs.lat }}" \
            --lon "${{ github.event.inputs.lon }}" \
            --radius "${{ github.event.inputs.radius }}"

      - name: Process analysis queue
        run: |
          python scripts/process_analysis_queue.py

      - name: Commit analysis output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            data/intelligence_queue.json \
            data/intelligence/latest.json \
            data/intelligence/history/*.json

          git diff --cached --quiet || git commit -m "Run coordinate analysis"

          git push
