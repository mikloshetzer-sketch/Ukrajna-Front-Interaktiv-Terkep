<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ukrajna Front – Blog Card</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: #020617;
      font-family: Arial, Helvetica, sans-serif;
      color: #e5e7eb;
    }

    .card {
      width: 1200px;
      height: 675px;
      box-sizing: border-box;
      padding: 34px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(239,68,68,0.22), transparent 36%),
        linear-gradient(135deg, #020617, #111827 55%, #1e293b);
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      color: #f8fafc;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .date {
      text-align: right;
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.5;
    }

    .main {
      display: grid;
      grid-template-columns: 0.85fr 0.85fr 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      height: 465px;
      box-sizing: border-box;
    }

    .label {
      color: #94a3b8;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .fai {
      font-size: 96px;
      font-weight: 900;
      color: #f8fafc;
      line-height: 1;
      margin-top: 20px;
    }

    .status {
      font-size: 30px;
      font-weight: 800;
      color: #f97316;
      margin-top: 12px;
    }

    .note {
      margin-top: 18px;
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.45;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 22px;
      color: #f8fafc;
    }

    .sector {
      margin-bottom: 14px;
    }

    .sector-row {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .bar-bg {
      height: 10px;
      border-radius: 999px;
      background: rgba(148,163,184,0.22);
      overflow: hidden;
    }

    .bar-fill {
      height: 10px;
      border-radius: 999px;
      background: #f97316;
    }

    .event {
      border-left: 5px solid #f97316;
      padding-left: 12px;
      margin-bottom: 13px;
    }

    .event-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.32;
      color: #f8fafc;
    }

    .event-meta {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    canvas {
      width: 100% !important;
      height: 155px !important;
      margin-top: 22px;
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      color: #94a3b8;
      font-size: 14px;
    }

    .brand {
      color: #e5e7eb;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="header">
      <div>
        <h1>Ukrajna fronthelyzet</h1>
        <div class="subtitle">Front Activity Index alapú napi vizuális kártya</div>
      </div>
      <div class="date">
        <div id="today">–</div>
        <div>Blog card</div>
      </div>
    </div>

    <div class="main">

      <div class="panel">
        <div class="label">Front Activity Index</div>
        <div class="fai" id="fai">–</div>
        <div class="status" id="status">–</div>
        <div class="note" id="summary">
          Adatok betöltése...
        </div>
        <canvas id="driversChart"></canvas>
      </div>

      <div class="panel">
        <h2 class="section-title">Legaktívabb szektorok</h2>
        <div id="sectors">Adatok betöltése...</div>
      </div>

      <div class="panel">
        <h2 class="section-title">Top események</h2>
        <div id="events">Adatok betöltése...</div>
      </div>

    </div>

    <div class="footer">
      <div class="brand">Törésvonalak / Ukrajna Front Monitor</div>
      <div id="updated">Frissítés: –</div>
    </div>

  </div>

  <script>
    const FRONT_ACTIVITY_PATH = "../data/front_activity_latest.json";

    document.getElementById("today").textContent =
      new Date().toLocaleDateString("hu-HU", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });

    async function loadJson(path) {
      try {
        const res = await fetch(path, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.json();
      } catch (err) {
        console.warn("Nem sikerült betölteni:", path, err);
        return null;
      }
    }

    function n(value) {
      if (value === undefined || value === null || isNaN(value)) return 0;
      return Number(value);
    }

    function renderSectors(sectors) {
      const box = document.getElementById("sectors");
      const top = (sectors || []).slice(0, 6);

      if (!top.length) {
        box.innerHTML = "Nincs szektoradat.";
        return;
      }

      box.innerHTML = top.map(s => `
        <div class="sector">
          <div class="sector-row">
            <span>${s.sector}</span>
            <strong>${n(s.score)}</strong>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${Math.min(100, n(s.score))}%"></div>
          </div>
        </div>
      `).join("");
    }

    function renderEvents(events) {
      const box = document.getElementById("events");
      const top = (events || []).slice(0, 5);

      if (!top.length) {
        box.innerHTML = "<div class='event'><div class='event-title'>Nincs kiemelt esemény.</div></div>";
        return;
      }

      box.innerHTML = top.map((e, i) => `
        <div class="event">
          <div class="event-title">${i + 1}. ${e.title || "OSINT-esemény"}</div>
          <div class="event-meta">${e.source || "forrás nélkül"} · ${e.sector || "besorolatlan"}</div>
        </div>
      `).join("");
    }

    function renderDriversChart(components) {
      const c = components || {};

      new Chart(document.getElementById("driversChart"), {
        type: "bar",
        data: {
          labels: ["OSINT", "FIRMS", "Sectors", "Critical"],
          datasets: [{
            data: [
              n(c.osint_density),
              n(c.firms_activity),
              n(c.active_sectors),
              n(c.critical_events)
            ],
            backgroundColor: [
              "rgba(249,115,22,0.80)",
              "rgba(239,68,68,0.70)",
              "rgba(59,130,246,0.65)",
              "rgba(234,179,8,0.65)"
            ],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: { color: "#cbd5e1" },
              grid: { color: "rgba(148,163,184,0.15)" }
            },
            y: {
              beginAtZero: true,
              ticks: { color: "#cbd5e1" },
              grid: { color: "rgba(148,163,184,0.15)" }
            }
          }
        }
      });
    }

    async function init() {
      const data = await loadJson(FRONT_ACTIVITY_PATH);

      if (!data) {
        document.getElementById("summary").textContent =
          "Nem sikerült betölteni a Front Activity Index adatfájlt.";
        return;
      }

      const counts = data.counts || {};
      const fai = n(data.front_activity_index);
      const status = data.status || "UNKNOWN";
      const topSector = data.top_sectors && data.top_sectors.length
        ? data.top_sectors[0].sector
        : "nem azonosított";

      document.getElementById("fai").textContent = fai;
      document.getElementById("status").textContent = status;
      document.getElementById("summary").innerHTML =
        `A mai aktivitási kép <strong>${status}</strong> szintet jelez. ` +
        `Az OSINT-feedben <strong>${n(counts.osint)}</strong> esemény, ` +
        `a 3 napos FIRMS-ablakban <strong>${n(counts.firms_3d)}</strong> hőanomália szerepel. ` +
        `Legaktívabb szektor: <strong>${topSector}</strong>.`;

      document.getElementById("updated").textContent =
        "Frissítés: " + (data.date || data.updated_utc || "ismeretlen");

      renderSectors(data.top_sectors || []);
      renderEvents(data.top_events || []);
      renderDriversChart(data.components || {});
    }

    init();
  </script>
</body>
</html>
